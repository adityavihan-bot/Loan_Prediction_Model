<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Approval Prediction</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4facfe,#00c6fb);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:420px;
            background:#fff;
            padding:30px;
            border-radius:12px;
            box-shadow:0 10px 25px rgba(0,0,0,0.25);
        }

        h1{
            text-align:center;
            color:#333;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:16px;
        }

        input:focus{
            outline:none;
            border-color:#007BFF;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:6px;
            background:#007BFF;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#0056b3;
        }

        .result{
            margin-top:20px;
            text-align:center;
            font-size:22px;
            font-weight:bold;
            color:green;
        }

        footer{
            margin-top:20px;
            text-align:center;
            color:gray;
            font-size:14px;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Loan Approval Prediction</h1>

    <form action="/predict" method="POST">

        <input
            type="number"
            name="age"
            placeholder="Enter Age"
            required>

        <input
            type="number"
            name="income"
            placeholder="Enter Income"
            required>

        <input
            type="number"
            name="loan_amount"
            placeholder="Enter Loan Amount"
            required>

        <input
            type="number"
            name="credit_score"
            placeholder="Enter Credit Score"
            required>

        <button type="submit">
            Predict Loan Status
        </button>

    </form>

    {% if prediction_text %}
    <div class="result">
        {{ prediction_text }}
    </div>
    {% endif %}

    <footer>
        Developed using Flask & Decision Tree Classifier
    </footer>

</div>

</body>

</html>
